server:
  port: 9000

spring:
  application:
    name: api-gateway

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9001/realms/textileco
          jwk-set-uri: http://localhost:9001/realms/textileco/protocol/openid-connect/certs

  cloud:
    gateway:
      routes:
        - id: product-service
          uri: ${PRODUCT_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/products/**
          filters:
            - StripPrefix=0

        - id: order-service
          uri: ${ORDER_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/orders/**
          filters:
            - StripPrefix=0

        - id: customer-service
          uri: ${CUSTOMER_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/customers/**
          filters:
            - StripPrefix=0

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      access: unrestricted
